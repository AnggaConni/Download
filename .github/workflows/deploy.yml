name: Auto Update APK Catalog

# Robot akan berjalan otomatis setiap ada perubahan (push) file .apk di folder APK/
on:
  push:
    paths:
      - 'APK/**/*.apk'
  # Memungkinkan Anda men-trigger workflow ini secara manual dari tab Actions
  workflow_dispatch: 

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    
    # Memberi izin robot untuk melakukan commit & push (write)
    permissions:
      contents: write 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm install app-info-parser

      - name: 🚀 Run APK Parser Script
        # Ini disesuaikan dengan nama file script Anda di screenshot
        run: node extract.js

      - name: 💾 Commit and Push apps.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add APK/apps.json APK/icons/
          git commit -m "🤖 auto: update apps.json and extract icons" || echo "No changes to commit"
          git push
